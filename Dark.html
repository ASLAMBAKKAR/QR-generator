<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Dark.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Document</title>
</head>
<body>
    <div class= "hero">
        <nav>
            <img src="Darkmode/portfolio_site_img/logo.png" class="logo">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Portfolio</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">HIRE ME</a></li>
            </ul>
            <img src="Darkmode/portfolio_site_img/moon.png" id="icon">
        </nav>

        <div class="info">
            <h1>I'm <span>Kate</span> Amelia</h1>
            <p>This is my official portfolio website to showcase my all work related to web <br> and UI design.</p>
            <a href="">Download CV</a>
        </div>

        <div class="img-box">
            <img src="Darkmode/portfolio_site_img/pattern.png" class="back-img">
            <img src="Darkmode/portfolio_site_img/girl.png" class="main-img">
        </div>
        <div class="social-links">
            <a href=""><i class="fa-brands fa-linkedin"></i></a>
            <a href=""><i class="fa-brands fa-facebook"></i></a>
            <a href=""><i class="fa-brands fa-behance"></i></a>
            <a href=""><i class="fa-brands fa-instagram"></i></a>
        </div>

    </div>

    <script>
        var icon = document.getElementById("icon");

icon.onclick = function(){
    document.body.classList.toggle("dark-theme");

    if(document.body.classList.contains("dark-theme")){
        icon.src = "Darkmode/portfolio_site_img/sun.png";
    }else{
        icon.src = "Darkmode/portfolio_site_img/moon.png";
    }
}
    </script>

</body>
</html>
